{% extends "layout.html" %}

{% block title %}Agregar Categoría - Admin{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand fw-bold" href="{{ url_for('admin_dashboard') }}">
            <span class="text-primary">ADMIN</span><span class="text-white">AEEEGS</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAdmin">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarAdmin">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_articles') }}">Artículos</a></li>
                <li class="nav-item"><a class="nav-link active" href="{{ url_for('admin_categories') }}">Categorías</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_departments') }}">Carpetas</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_board') }}">Directiva</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('list_admins') }}">Usuarios</a></li>
                <li class="nav-item"><a class="nav-link btn btn-outline-light btn-sm ms-lg-3 px-3 rounded-pill" href="{{ url_for('logout') }}">Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-card p-4 p-md-5 rounded-4 shadow-lg" style="background: white;">
                <div class="mb-4">
                    <a href="{{ url_for('admin_categories') }}" class="text-decoration-none text-muted small fw-bold">
                        <i class="fas fa-arrow-left me-1"></i> VOLVER A LA LISTA
                    </a>
                </div>
                <h2 class="fw-bold mb-4">Nueva Categoría</h2>
                
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase">Nombre de la Categoría</label>
                        <input type="text" name="name" class="form-control rounded-3 p-3 bg-light border-0" placeholder="Ej. Internacionales" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold w-100">
                        <i class="fas fa-plus me-2"></i> CREAR CATEGORÍA
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
